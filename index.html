<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Battle - Multiplayer Online</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        /* ========== ESTILOS (Originales mantenidos) ========== */
        :root {
            --bg-color: #2c3e50;
            --text-color: #ecf0f1;
            --gold: #f1c40f;
            --active-p1: #3498db;
            --active-p2: #e74c3c;
            --header-height: 130px;
            --bar-height: 90px;
            --sidebar-width: 220px;
            --silver-shine: linear-gradient(135deg, #9aa0a6 0%, #cfd4d8 50%, #9aa0a6 100%);
            --glass-clear: rgba(255, 255, 255, 0.02);
            --reflection: rgba(255, 255, 255, 0.25);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh; width: 100vw;
            overflow: hidden;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            display: flex;
            flex-direction: column;
        }
        /* Popups */
        #setup-screen, #coin-overlay, #import-overlay, #victory-overlay, #history-overlay, #multiplayer-setup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 8000; padding: 20px;
        }
        #setup-screen { background: #1a252f; z-index: 9999; display: flex; }
        #multiplayer-setup { background: rgba(0,0,0,0.95); z-index: 10000; }
        #coin-overlay, #import-overlay { background: rgba(0,0,0,0.95); }
        #history-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        #victory-overlay {
            background: rgba(15,15,20,0.96);
            backdrop-filter: blur(10px);
            z-index: 9000;
            justify-content: flex-start;
            padding-top: 50px;
        }
        .winner-title { font-size: 3rem; color: var(--gold); text-shadow: 0 0 20px orange; animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275); text-align: center; }
        .winner-name { font-size: 4rem; font-weight: bold; color: white; margin: 5px 0 20px 0; animation: glow 1s infinite alternate; text-align: center; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes glow { from { text-shadow: 0 0 10px white; } to { text-shadow: 0 0 30px var(--gold), 0 0 50px orange; } }
        .confetti { position: absolute; width: 12px; height: 12px; background: #f00; top: -10px; z-index: 9500; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
        .input-group { margin: 10px 0; width: 80%; max-width: 300px; }
        input { padding: 15px; font-size: 1.1rem; border-radius: 8px; border: none; text-align: center; width: 100%; background: #34495e; color: white; margin-bottom: 10px; }
        select { padding: 15px; font-size: 1.1rem; border-radius: 8px; border: 2px solid #7f8c8d; text-align-last: center; width: 100%; background-color: #34495e; color: white; margin-bottom: 10px; cursor: pointer; font-weight: bold; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 20px; padding-right: 40px; }
        button.btn-main { padding: 15px 40px; font-size: 1.3rem; background: #27ae60; color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 0 #1e8449; transition: transform 0.1s; }
        button.btn-main:active { transform: scale(0.95); }
        button.btn-sec { padding: 10px 20px; font-size: 0.9rem; background: #34495e; color: #bdc3c7; border: 1px solid #7f8c8d; border-radius: 8px; margin-top: 15px; cursor: pointer; }
        button.btn-multi { background: #8e44ad; color: white; border: none; border-radius: 50px; padding: 15px 40px; font-size: 1.3rem; margin-top: 15px; box-shadow: 0 4px 0 #6c3483; cursor: pointer; }
        .top-bar {
            flex: 0 0 auto; width: 100%; height: var(--header-height);
            background: rgba(0,0,0,0.2);
            display: flex; justify-content: space-around; align-items: flex-start;
            padding-top: 25px; padding-bottom: 10px;
            overflow: visible;
        }
        .player-badge {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 5px 15px; border-radius: 12px;
            background: rgba(255,255,255,0.05); width: 40%; max-width: 200px;
            transition: all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
            position: relative;
        }
        .player-badge.active-p1 { background: rgba(52,152,219,0.3); border: 2px solid var(--active-p1); transform: scale(1.05); }
        .player-badge.active-p2 { background: rgba(231,76,60,0.3); border: 2px solid var(--active-p2); transform: scale(1.05); }
        .player-badge.winner-badge { background: linear-gradient(45deg,#f1c40f,#e67e22); border: 4px solid white; transform: scale(1.15); box-shadow: 0 0 30px var(--gold); z-index: 500; }
        .p-name-live { font-size: 1.1rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
        .p-score-live { font-size: 2.2rem; font-weight: bold; line-height: 1; margin: 2px 0; }
        .hearts-panel {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 2px; background: rgba(0,0,0,0.4);
            padding: 5px 12px; border-radius: 20px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
        .heart-counter { display: flex; align-items: center; gap: 5px; font-size: 1rem; font-weight: 900; color: white; text-shadow: 0 1px 2px black; }
        .icon-h { width: 22px; height: 22px; background-size: cover; background-repeat: no-repeat; filter: drop-shadow(0 3px 2px rgba(0,0,0,0.6)); transition: transform 0.2s; }
        .icon-red { background-image: url('https://cdn-icons-png.flaticon.com/512/210/210545.png'); filter: drop-shadow(0 2px 3px rgba(100,0,0,0.6)) brightness(1.1); }
        .icon-gold { background-image: url('https://cdn-icons-png.flaticon.com/512/210/210545.png'); filter: sepia(1) saturate(5) hue-rotate(10deg) brightness(1.1) contrast(1.2) drop-shadow(0 2px 3px rgba(0,0,0,0.6)); }
        .content-area { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }
        .board-section { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .memory-game { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); gap: 8px; width: 100%; height: 100%; max-width: 600px; }
        
        /* MODIFICACIÓN CRÍTICA: La clase matched también debe rotar la carta */
        .memory-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s; cursor: pointer; }
        .memory-card.flip, .memory-card.matched { transform: rotateY(180deg); } 
        
        .memory-card.matched .front-face { background-color: #111 !important; opacity: 0.15; filter: grayscale(100%); box-shadow: none !important; border-color: #333; }
        .front-face { background: #ffffff; border: 2px solid #ddd; border-radius: 8px; width: 100%; height: 100%; position: absolute; backface-visibility: hidden; transform: rotateY(180deg); display: flex; justify-content: center; align-items: center; font-size: clamp(30px,10vmin,70px); transition: box-shadow 0.3s ease; }
        .memory-card.flip .front-face { border: 2px solid #fff; box-shadow: 0 0 15px var(--gold), 0 0 30px var(--gold); }
        .back-face { width: 100%; height: 100%; position: absolute; border-radius: 8px; backface-visibility: hidden; background: var(--silver-shine); border: 3px solid white; outline: 1px solid #999; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .bottom-bar { flex: 0 0 auto; width: 100%; height: var(--bar-height); background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; padding: 10px 15px; z-index: 1000; border-top: 1px solid #444; }
        .play-menu-wrapper { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 10px; }
        #play-btn { background: linear-gradient(135deg, #4e9f7a, #2f855a); border: none; border-radius: 10px; padding: 14px 34px; min-width: 150px; font-size: 16px; font-weight: 600; color: white; box-shadow: 0 6px 18px rgba(0,0,0,0.35); transition: all 0.25s ease; }
        #menu-btn { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #2d3748; color: #ffffff; border-radius: 10px; transition: all 0.2s ease; }
        #exit-btn { position: fixed; right: 14px; bottom: 14px; width: 52px; height: 52px; background: linear-gradient(135deg, #ff4d4d, #c0392b); border: none; border-radius: 12px; color: white; font-size: 22px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); cursor: pointer; transition: all 0.25s ease; }
        .history-container { background: #2c3e50; padding: 20px; border-radius: 15px; border: 2px solid #555; width: 90%; max-width: 350px; max-height: 70vh; overflow-y: auto; }
        .history-table { width: 100%; border-collapse: collapse; text-align: center; }
        .history-table th { padding: 8px; color: #f1c40f; border-bottom: 2px solid #555; }
        .history-table td { padding: 8px; border-bottom: 1px solid #444; }
        .coin-container { width: 160px; height: 160px; position: relative; perspective: 1000px; margin-bottom: 20px; }
        .coin { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; border-radius: 50%; }
        .coin-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; text-align: center; font-size: 1.2rem; font-weight: bold; color: white; padding: 10px; word-break: break-word; line-height: 1.1; border: 8px solid white; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .coin-front { background-color: var(--active-p1); transform: rotateY(0deg); }
        .coin-back { background-color: var(--active-p2); transform: rotateY(180deg); }
        .room-code { font-size: 1.2rem; background: #2d3748; padding: 10px 20px; border-radius: 30px; margin: 15px 0; display: inline-block; color: var(--gold); }
    </style>
</head>
<body>
    <div id="giant-gold-heart-container"><div class="gold-heart-3d"></div></div>

    <div id="setup-screen">
        <h1 style="color:#f1c40f; margin-bottom:20px; font-size:2rem;">🐵 MEMORY</h1>
        <div class="input-group"><input type="text" id="p1-input" placeholder="Tu nombre / Your name"></div>
        <div class="input-group" style="margin-top:20px;">
            <select id="theme-select">
                <option value="animals">🐶 Animales / Animals</option>
                <option value="flags">🇪🇸 Banderas / Flags</option>
                <option value="objects">🚀 Objetos / Objects</option>
                <option value="fruits">🍎 Frutas / Fruits</option>
                <option value="mix">🎲 ¡MIX! / RANDOM!</option>
            </select>
        </div>
        <div class="multi-buttons">
            <button class="btn-multi" onclick="playButtonSound(); showMultiplayerSetup('create')">🌐 Crear Sala</button>
            <button class="btn-multi" onclick="playButtonSound(); showMultiplayerSetup('join')">🔗 Unirse a Sala</button>
        </div>
        <button class="btn-sec" onclick="playButtonSound(); showImportExport()">📂 Datos / Data</button>
    </div>

    <div id="multiplayer-setup">
        <div class="history-container" style="max-width: 400px;">
            <h2 style="color:#f1c40f; text-align:center;">🌐 MULTIPLAYER</h2>
            <div id="multi-status" style="margin: 20px 0; text-align: center; font-size: 1.2rem;">Conectando...</div>
            <div id="multi-code" class="room-code"></div>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                <button class="btn-sec" onclick="cancelMultiplayer()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="import-overlay"><h2>📂 GESTIÓN DE DATOS</h2><div style="width:80%;max-width:300px;"><button class="btn-file btn-save" onclick="exportToFile()">💾 Guardar Archivo</button><button class="btn-file btn-load" onclick="document.getElementById('file-upload').click()">📂 Cargar Archivo</button><input type="file" id="file-upload" style="display:none;" accept=".json" onchange="importFromFile(this)"><button class="btn-sec" onclick="closeImportExport()">Cerrar</button></div></div>
    <div id="coin-overlay"><h2>¿Quién empieza?</h2><div class="coin-container"><div class="coin" id="the-coin"><div class="coin-face coin-front">...</div><div class="coin-face coin-back">...</div></div></div><h3 id="coin-result">...</h3></div>
    <div id="victory-overlay"><div class="winner-title">¡VICTORIA!</div><div class="winner-name" id="winner-name-text">NOMBRE</div><div id="pot-container"></div><button class="btn-main" onclick="closeVictory()">SIGUIENTE</button></div>
    
    <div class="top-bar">
        <div class="player-badge" id="p1-badge"><span class="p-name-live" id="p1-name-display">J1</span><span class="p-score-live" id="p1-score">0</span></div>
        <div class="player-badge" id="p2-badge"><span class="p-name-live" id="p2-name-display">J2</span><span class="p-score-live" id="p2-score">0</span></div>
    </div>

    <div class="content-area"><div class="board-section"><div class="memory-game" id="tablero"></div></div></div>

    <div class="bottom-bar"><div class="play-menu-wrapper"><button id="play-btn" class="btn-game btn-next" onclick="playButtonSound();">PLAY ▶</button><button id="menu-btn" class="btn-game" onclick="toggleMenu(true)">☰</button></div><button id="exit-btn" onclick="exitGame()">✕</button></div>

    <script>
        // ========== FIREBASE CONFIGURACIÓN ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBp41qQZvXPJHNY15FdxX1fcdAieUAedRg",
            authDomain: "memory-game-eyd.firebaseapp.com",
            databaseURL: "https://memory-game-eyd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "memory-game-eyd",
            storageBucket: "memory-game-eyd.firebasestorage.app",
            messagingSenderId: "384110699653",
            appId: "1:384110699653:web:61e3827529177c1cddf5ec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== VARIABLES GLOBALES ==========
        const THEMES = {
            animals: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯'],
            flags: ['🇪🇸','🇺🇸','🇫🇷','🇩🇪','🇮🇹','🇯🇵','🇨🇳','🇧🇷','🇬🇧','🇦🇷'],
            objects: ['🚗','✈️','🚀','💻','📱','🎮','🎧','📷','⌚','🔑'],
            fruits: ['🍎','🍌','🍇','🍉','🍓','🍍','🥝','🍑','🍒','🥭']
        };

        let gameState = {
            p1: {name:"", score:0},
            p2: {name:"", score:0},
            currentPlayer: 1,
            pairsLeft: 10,
            isLocked: false,
            hasFlippedCard: false,
            firstCardIdx: null,
            firstVal: null,
            boardCards: [],
            cardStatus: [],
            selectedTheme: 'animals',
            goldPowerUsed: false
        };

        let isMultiplayer = false;
        let gameId = null;
        let playerId = null;
        let remoteListener = null;
        let waitingForSync = false;
        let audioCtx = null;

        function initAudio() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
        function playTone(freq,dur,vol=0.1) { if(!audioCtx) return; let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.value=freq; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur); }
        function playButtonSound() { initAudio(); playTone(440, 0.1); }

        // ========== MULTIPLAYER ==========
        function showMultiplayerSetup(mode) {
            document.getElementById('multiplayer-setup').style.display = 'flex';
            if (mode === 'create') createRoom();
            else {
                let code = prompt('Introduce el código de la sala:');
                if (code) joinRoom(code);
                else cancelMultiplayer();
            }
        }

        function createRoom() {
            const name = document.getElementById('p1-input').value.trim() || "Host";
            const theme = document.getElementById('theme-select').value;
            gameId = "game_" + Math.floor(Math.random() * 9999);
            playerId = 1;
            isMultiplayer = true;

            let pool = THEMES[theme] || THEMES.animals;
            let selection = pool.slice(0, 10);
            let board = [...selection, ...selection].sort(() => Math.random() - 0.5);
            
            db.ref("games/" + gameId).set({
                players: { p1: name, p2: null },
                theme: theme,
                boardCards: board,
                cardStatus: new Array(20).fill(0),
                state: { 
                    p1Score: 0, p2Score: 0, currentPlayer: 1, pairsLeft: 10, 
                    locked: false, flipped: false, firstCardIdx: null, firstVal: null 
                },
                ready: false
            }).then(() => {
                document.getElementById('multi-status').textContent = 'Esperando oponente...';
                document.getElementById('multi-code').innerHTML = `Código: <strong>${gameId}</strong>`;
                startListening();
            });
        }

        function joinRoom(code) {
            gameId = code;
            playerId = 2;
            isMultiplayer = true;
            const name = document.getElementById('p1-input').value.trim() || "Invitado";
            db.ref("games/" + gameId).once("value").then(snap => {
                if (!snap.exists()) { alert("Sala no existe"); cancelMultiplayer(); return; }
                db.ref("games/" + gameId + "/players/p2").set(name);
                startListening();
            });
        }

        function startListening() {
            if (remoteListener) db.ref("games/" + gameId).off();
            remoteListener = db.ref("games/" + gameId).on("value", (snap) => {
                const data = snap.val();
                if (!data) return;

                if (data.players.p1 && data.players.p2 && !data.ready) {
                    db.ref("games/" + gameId + "/ready").set(true);
                    gameState.boardCards = data.boardCards;
                    gameState.p1.name = data.players.p1;
                    gameState.p2.name = data.players.p2;
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('multiplayer-setup').style.display = 'none';
                    createBoard();
                    updateUI();
                }

                if (data.state && !waitingForSync) {
                    applyRemoteState(data.state, data.cardStatus);
                }
            });
        }

        function syncState() {
            if (!isMultiplayer || !gameId) return;
            db.ref("games/" + gameId + "/state").set({
                p1Score: gameState.p1.score,
                p2Score: gameState.p2.score,
                currentPlayer: gameState.currentPlayer,
                pairsLeft: gameState.pairsLeft,
                locked: gameState.isLocked,
                flipped: gameState.hasFlippedCard,
                firstCardIdx: gameState.firstCardIdx,
                firstVal: gameState.firstVal
            });
            db.ref("games/" + gameId + "/cardStatus").set(gameState.cardStatus);
        }

        function applyRemoteState(remoteState, remoteCardStatus) {
            waitingForSync = true;
            gameState.p1.score = remoteState.p1Score;
            gameState.p2.score = remoteState.p2Score;
            gameState.currentPlayer = remoteState.currentPlayer;
            gameState.pairsLeft = remoteState.pairsLeft;
            gameState.isLocked = remoteState.locked;
            gameState.hasFlippedCard = remoteState.flipped;
            gameState.firstCardIdx = remoteState.firstCardIdx;
            gameState.firstVal = remoteState.firstVal;
            gameState.cardStatus = remoteCardStatus || [];
            updateUI();
            refreshBoardVisual();
            waitingForSync = false;
        }

        // ========== ENGINE DEL JUEGO ==========
        function createBoard() {
            const t = document.getElementById('tablero');
            t.innerHTML = '';
            gameState.boardCards.forEach((emoji, i) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = i;
                card.innerHTML = `<div class="front-face">${emoji}</div><div class="back-face"></div>`;
                card.onclick = () => flipCard(card, i);
                t.appendChild(card);
            });
        }

        function flipCard(card, i) {
            if (gameState.isLocked || gameState.cardStatus[i] !== 0) return;
            if (isMultiplayer && playerId !== gameState.currentPlayer) return;

            initAudio();
            playTone(500, 0.1);
            gameState.cardStatus[i] = 1; 

            if (!gameState.hasFlippedCard) {
                gameState.hasFlippedCard = true;
                gameState.firstCardIdx = i;
                gameState.firstVal = gameState.boardCards[i];
                syncState();
                refreshBoardVisual();
            } else {
                gameState.isLocked = true;
                gameState.secondCardIdx = i;
                const secondVal = gameState.boardCards[i];
                syncState();
                refreshBoardVisual();

                if (gameState.firstVal === secondVal) {
                    setTimeout(matchSuccess, 600);
                } else {
                    setTimeout(matchFail, 1000);
                }
            }
        }

        function matchSuccess() {
            gameState.cardStatus[gameState.firstCardIdx] = 2;
            gameState.cardStatus[gameState.secondCardIdx] = 2;
            let p = gameState.currentPlayer === 1 ? gameState.p1 : gameState.p2;
            p.score++;
            gameState.pairsLeft--;
            resetTurnVars();
            if (gameState.pairsLeft === 0) endGame();
            syncState();
            refreshBoardVisual();
        }

        function matchFail() {
            gameState.cardStatus[gameState.firstCardIdx] = 0;
            gameState.cardStatus[gameState.secondCardIdx] = 0;
            gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
            resetTurnVars();
            syncState();
            refreshBoardVisual();
        }

        function resetTurnVars() {
            gameState.hasFlippedCard = false;
            gameState.isLocked = false;
            gameState.firstCardIdx = null;
            gameState.firstVal = null;
        }

        function refreshBoardVisual() {
            const cards = document.querySelectorAll('.memory-card');
            cards.forEach(card => {
                const idx = card.dataset.index;
                const status = gameState.cardStatus[idx];
                if (status === 2) { card.classList.add('matched'); card.classList.remove('flip'); }
                else if (status === 1) { card.classList.add('flip'); card.classList.remove('matched'); }
                else { card.classList.remove('flip', 'matched'); }
            });
        }

        function updateUI() {
            document.getElementById('p1-name-display').textContent = gameState.p1.name || "J1";
            document.getElementById('p2-name-display').textContent = gameState.p2.name || "J2";
            document.getElementById('p1-score').textContent = gameState.p1.score;
            document.getElementById('p2-score').textContent = gameState.p2.score;
            const b1 = document.getElementById('p1-badge'), b2 = document.getElementById('p2-badge');
            if (gameState.currentPlayer === 1) { b1.classList.add('active-p1'); b2.classList.remove('active-p2'); }
            else { b1.classList.remove('active-p1'); b2.classList.add('active-p2'); }
        }

        // ========== FUNCIONES DE RELLENO (Física/UI) ==========
        function endGame() {
            const winner = gameState.p1.score > gameState.p2.score ? gameState.p1.name : gameState.p2.name;
            document.getElementById('winner-name-text').textContent = winner;
            document.getElementById('victory-overlay').style.display = 'flex';
        }
        function exitGame() { location.reload(); }
        function closeVictory() { exitGame(); }
        function cancelMultiplayer() { if (remoteListener) db.ref("games/"+gameId).off(); location.reload(); }
        function toggleMenu(s) { }
        function showImportExport() { document.getElementById('import-overlay').style.display='flex'; }
        function closeImportExport() { document.getElementById('import-overlay').style.display='none'; }
    </script>
</body>
</html>
