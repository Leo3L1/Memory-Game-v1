<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Memory Battle - Multiplayer (debug)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { background: #2c3e50; color: white; font-family: monospace; padding: 20px; }
        button { margin: 5px; padding: 10px; cursor: pointer; }
        #log { background: #1a252f; padding: 10px; height: 200px; overflow: auto; font-size: 12px; margin-top: 20px; }
        .player { margin: 10px; padding: 10px; background: #34495e; display: inline-block; width: 200px; }
        .active { border: 2px solid gold; }
    </style>
</head>
<body>
    <h1>Memory Battle - Multiplayer (debug)</h1>
    <div>
        <label>Tu nombre: <input type="text" id="nombre" value="Jugador"></label>
        <button id="crear">🌐 Crear Sala</button>
        <button id="unirse">🔗 Unirse a Sala</button>
        <button id="stats">📊 Ver estadísticas</button>
    </div>
    <div id="info"></div>
    <div id="log"></div>

    <script>
        // ========== CAMBIA ESTO POR TUS CREDENCIALES ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBp41qQZvXPJHNY15FdxX1fcdAieUAedRg",
            authDomain: "memory-game-eyd.firebaseapp.com",
            databaseURL: "https://memory-game-eyd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "memory-game-eyd",
            storageBucket: "memory-game-eyd.firebasestorage.app",
            messagingSenderId: "384110699653",
            appId: "1:384110699653:web:61e3827529177c1cddf5ec"
        };
        // ====================================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let gameId = null;
        let playerId = null;
        let isMultiplayer = false;

        function log(msg) {
            const div = document.getElementById('log');
            div.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
            console.log(msg);
        }

        document.getElementById('crear').onclick = () => {
            const name = document.getElementById('nombre').value || "Jugador";
            gameId = "game_" + Math.floor(Math.random() * 100000);
            playerId = 1;
            isMultiplayer = true;

            // Generar tablero simple
            const boardCards = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','💛','💛','🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
            boardCards.sort(() => Math.random() - 0.5);
            const cardStatus = new Array(20).fill(0);

            db.ref("games/" + gameId).set({
                players: { p1: name, p2: null },
                boardCards: boardCards,
                cardStatus: cardStatus,
                state: {
                    p1Score: 0, p2Score: 0,
                    currentPlayer: 1,
                    pairsLeft: 10,
                    locked: false,
                    flipped: false
                },
                ready: false
            }).then(() => {
                log(`✅ Sala creada: ${gameId}`);
                document.getElementById('info').innerHTML = `Código de sala: <strong>${gameId}</strong>`;
                escuchar();
            }).catch(err => {
                log(`❌ Error al crear sala: ${err.message}`);
            });
        };

        document.getElementById('unirse').onclick = () => {
            const code = prompt("Código de sala:");
            if (!code) return;
            gameId = code;
            playerId = 2;
            isMultiplayer = true;

            db.ref("games/" + gameId).once("value").then(snap => {
                if (!snap.exists()) {
                    alert("La sala no existe");
                    return;
                }
                const name = document.getElementById('nombre').value || "Jugador";
                db.ref("games/" + gameId + "/players/p2").set(name);
                log(`✅ Unido a sala ${gameId}`);
                escuchar();
            }).catch(err => {
                log(`❌ Error al unirse: ${err.message}`);
            });
        };

        function escuchar() {
            log("Escuchando cambios en la sala...");
            db.ref("games/" + gameId).on("value", (snap) => {
                const data = snap.val();
                if (!data) return;
                log(`Estado recibido: players=${data.players?.p1} vs ${data.players?.p2}, ready=${data.ready}`);

                // Cuando ambos jugadores están presentes, iniciar el juego
                if (data.players?.p1 && data.players?.p2 && !data.ready) {
                    db.ref("games/" + gameId + "/ready").set(true);
                    log("¡Ambos jugadores conectados! Iniciando partida...");
                    // Aquí pondríamos la lógica para mostrar el tablero, etc.
                    document.getElementById('info').innerHTML += `<br>Partida iniciada.`;
                }
            });
        }

        // Botón de estadísticas para ver la estructura actual
        document.getElementById('stats').onclick = () => {
            if (!gameId) return alert("No hay sala activa");
            db.ref("games/" + gameId).once("value").then(snap => {
                const data = snap.val();
                log(`Datos actuales: ${JSON.stringify(data, null, 2)}`);
            });
        };
    </script>
</body>
</html>
